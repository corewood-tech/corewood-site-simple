<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<link rel="icon" type="image/png" href="%sveltekit.assets%/favicon.png" />
	<link rel="icon" type="image/x-icon" href="%sveltekit.assets%/favicon.ico" />
	<title>TETRA Demo — Corewood</title>
	<meta name="description" content="Interactive 3D graph visualization demo. Explore the recommendations dataset with TETRA's WebGPU-powered viewer — 2,330 nodes, 3,506 edges, running entirely in your browser." />
	<meta property="og:title" content="TETRA Demo — Corewood" />
	<meta property="og:description" content="Interactive 3D graph visualization. Explore the recommendations dataset in your browser." />
	<meta property="og:image" content="/assets/img/og-tetra.png" />
	<meta property="og:type" content="website" />
	<meta name="twitter:card" content="summary_large_image" />
	<meta name="twitter:image" content="/assets/img/og-tetra.png" />
	%sveltekit.head%
</head>
<body>
	<div id="app-shell">
		<header class="cw-site-header">
			<div class="cw-header-plate">
				<div class="cw-rivet cw-rivet-l"></div>
				<div class="cw-rivet cw-rivet-r"></div>
				<div class="cw-header-inner">
					<div class="cw-nav-left">
						<a href="/profile/">Work</a>
						<a href="/about/">About</a>
					</div>
					<a href="/" class="cw-logo-link">
						<img src="%sveltekit.assets%/corewood-symbol.png" alt="Corewood" class="cw-logo-img" />
					</a>
					<div class="cw-nav-right">
						<a href="/blog/">Blog</a>
						<a href="/contact/">Contact</a>
						<span class="cw-collab">
							<span class="cw-collab-text">in collaboration with</span>
							<a href="https://www.verdantintel.com/" target="_blank" rel="noopener noreferrer">
								<img src="%sveltekit.assets%/verdant-logo.png" alt="Verdant Intelligence" class="cw-verdant-logo" />
							</a>
						</span>
						<a href="/schedule-meeting/" class="cw-cta">Schedule a Meeting</a>
					</div>
				</div>
			</div>
		</header>
		<div id="app">%sveltekit.body%</div>
	</div>

</html>
